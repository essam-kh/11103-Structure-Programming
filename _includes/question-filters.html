<style>
.filter-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 2rem;
  align-items: center;
  background: #f8fafc;
  padding: 1rem 1.5rem;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
}

.filter-group {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}

.filter-label {
  font-weight: 600;
  color: #4a5568;
  font-size: 0.9rem;
  margin-right: 0.5rem;
}

.filter-btn {
  background: white;
  border: 1px solid #cbd5e1;
  color: #64748b;
  padding: 0.4rem 1rem;
  border-radius: 9999px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.filter-btn:hover {
  background: #f1f5f9;
  color: #334155;
}

.filter-btn.active {
  background: #3182ce;
  color: white;
  border-color: #3182ce;
}

.custom-dropdown {
  position: relative;
  display: inline-block;
}

.dropdown-trigger {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  border: 1px solid #cbd5e1;
  background-color: white;
  color: #4a5568;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  min-width: 130px;
  transition: all 0.2s ease;
  font-family: inherit;
}

.dropdown-trigger:hover {
  border-color: #94a3b8;
}

.dropdown-trigger.open {
  border-color: #3182ce;
  box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.2);
}

.dropdown-arrow {
  width: 10px;
  height: 6px;
  fill: #94a3b8;
  transition: transform 0.2s ease;
}

.dropdown-trigger.open .dropdown-arrow {
  transform: rotate(180deg);
}

.dropdown-menu {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  background: white;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
  min-width: 100%;
  display: flex;
  flex-direction: column;
  padding: 0.35rem;
  z-index: 100;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-5px);
  transition: all 0.2s ease;
}

.dropdown-menu.open {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.dropdown-item {
  background: transparent;
  border: none;
  padding: 0.45rem 0.6rem;
  text-align: left;
  font-size: 0.85rem;
  color: #4a5568;
  cursor: pointer;
  border-radius: 5px;
  font-weight: 500;
  transition: all 0.15s ease;
  white-space: nowrap;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.dropdown-item::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: transparent;
  transition: background 0.15s ease;
}

.dropdown-item:hover {
  background: #f1f5f9;
}

.dropdown-item.active {
  background: #eff6ff;
  color: #2563eb;
  font-weight: 600;
}

.dropdown-item.active::before {
  background: #3b82f6;
}

.question-card {
  position: relative;
}

.difficulty-badge {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0.15rem 0.55rem;
  border-radius: 4px;
  margin-left: 0.75rem;
  vertical-align: middle;
}

.difficulty-badge.easy   { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
.difficulty-badge.medium { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
.difficulty-badge.hard   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
</style>

<div class="filter-controls">
  <div class="filter-group">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="easy">Easy</button>
    <button class="filter-btn" data-filter="medium">Medium</button>
    <button class="filter-btn" data-filter="hard">Hard</button>
  </div>

  <div class="filter-group" style="margin-left: auto;">
    <span class="filter-label">Sort:</span>
    <div class="custom-dropdown" id="difficulty-sort-dropdown">
      <button class="dropdown-trigger" id="sort-trigger">
        <span id="sort-trigger-text">Default Order</span>
        <svg viewBox="0 0 10 6" class="dropdown-arrow"><path d="M0 0l5 6 5-6z" fill="currentColor"/></svg>
      </button>
      <div class="dropdown-menu" id="sort-menu">
        <button class="dropdown-item active" data-value="default">Default Order</button>
        <button class="dropdown-item" data-value="asc">Easiest First</button>
        <button class="dropdown-item" data-value="desc">Hardest First</button>
      </div>
    </div>
    <select class="sort-select" id="difficulty-sort" style="display: none;">
      <option value="default">Default Order</option>
      <option value="asc">Easiest First</option>
      <option value="desc">Hardest First</option>
    </select>
  </div>
</div>

<script src="{{ '/assets/js/question-filters.js' | relative_url }}" defer></script>
