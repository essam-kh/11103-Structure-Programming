<!-- ── Floating IDE Panel ── -->
<div id="ide-panel">
  <div id="ide-tab" title="Toggle Code Playground">
    <span class="ide-tab-text">Code Playground</span>
  </div>

  <div class="ide-body">
    <iframe
      id="ide-frame"
      src=""
      frameborder="0"
      width="100%"
      height="100%"
      allowfullscreen
      loading="lazy"
    ></iframe>
  </div>
  <div id="ide-resize-handle" title="Drag to resize"></div>
</div>
